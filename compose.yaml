services:
  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_DB=morsel
      - POSTGRES_PASSWORD=secret
      - POSTGRES_USER=morsel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U morsel -d morsel" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
