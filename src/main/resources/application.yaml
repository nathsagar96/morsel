spring:
  application:
    name: morsel
  datasource:
    url: jdbc:postgresql://localhost:5432/morsel
    username: morsel
    password: ${DB_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  mvc:
    problemdetails:
      enabled: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  threads:
    virtual:
      enabled: true
  data:
    web:
      pageable:
        max-page-size: 50
  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 900000
    refresh-expiration-ms: 604800000
    issuer: morsel
    audience: morsel-api
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
    allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
    allowed-headers: Authorization,Content-Type,Accept,X-Requested-With
  storage:
    upload-dir: uploads
  base-url: http://localhost:8080
  lockout:
    max-failed-attempts: 5
    lock-duration-minutes: 15
  password-reset:
    token-expiry-minutes: 15

logging:
  level:
    root: INFO
    com:
      morsel: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}