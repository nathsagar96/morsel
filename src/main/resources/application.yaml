spring:
  application:
    name: morsel
  datasource:
    url: jdbc:postgresql://localhost:5432/morsel
    username: morsel
    password: secret
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  mvc:
    problemdetails:
      enabled: true
  threads:
    virtual:
      enabled: true

app:
  jwt:
    # Override JWT_SECRET in production with a strong random base64-encoded key
    secret: ${JWT_SECRET:SBaL2tluRm6kW29kzJ+RboD4PFZr9pRWI+tLg1SvqGM=}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}