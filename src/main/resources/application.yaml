spring:
  application:
    name: morsel
  datasource:
    url: jdbc:postgresql://localhost:5432/morsel
    username: morsel
    password: secret
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  mvc:
    problemdetails:
      enabled: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  threads:
    virtual:
      enabled: true
  data:
    web:
      pageable:
        max-page-size: 50
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

app:
  jwt:
    # Override JWT_SECRET in production with a strong random base64-encoded key
    secret: ${JWT_SECRET:SBaL2tluRm6kW29kzJ+RboD4PFZr9pRWI+tLg1SvqGM=}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
    issuer: ${JWT_ISSUER:morsel}
    audience: ${JWT_AUDIENCE:morsel-api}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,PATCH,OPTIONS}
    allowed-headers: ${CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,X-Requested-With}
  storage:
    upload-dir: ${APP_UPLOAD_DIR:uploads}
  base-url: ${APP_BASE_URL:http://localhost:8080}
  lockout:
    max-failed-attempts: ${LOCKOUT_MAX_FAILED_ATTEMPTS:5}
    lock-duration-minutes: ${LOCKOUT_LOCK_DURATION_MINUTES:15}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}